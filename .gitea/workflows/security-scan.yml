name: Security Scan
on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  sca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Trivy vulnerability scan
        run: |
          trivy fs --scanners vuln \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --format table .

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Install Gitleaks
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/gitleaks_8.30.0_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks

      - name: Gitleaks (full history)
        run: gitleaks detect --source . --no-banner --exit-code 1

      - name: Trivy secret scan
        run: |
          trivy fs --scanners secret \
            --exit-code 1 \
            --format table .

  sbom:
    runs-on: ubuntu-latest
    needs: [sca]
    if: ${{ gitea.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Generate SBOM (CycloneDX)
        run: |
          trivy fs --format cyclonedx -o sbom.json .

      - name: Upload SBOM to Dependency-Track
        env:
          DT_URL: ${{ secrets.DT_URL }}
          DT_API_KEY: ${{ secrets.DT_API_KEY }}
        run: |
          if [ -z "${DT_URL:-}" ] || [ -z "${DT_API_KEY:-}" ]; then
            echo "SKIP: DT_URL or DT_API_KEY not configured"
            exit 0
          fi
          curl -sf -X POST "${DT_URL}/api/v1/bom" \
            -H "X-Api-Key: ${DT_API_KEY}" \
            -F "projectName=claude-vscode-metrics" \
            -F "projectVersion=latest" \
            -F "autoCreate=true" \
            -F "bom=@sbom.json"
